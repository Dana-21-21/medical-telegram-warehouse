version: 2

models:

  - name: dim_channels
    description: Stores information about each Telegram channel.

    columns:

      - name: channel_key
        description: Surrogate key for each channel.
        tests:
          - unique
          - not_null

  - name: dim_dates
    description: Date dimension used for time-based analysis.

    columns:

      - name: full_date
        description: Calendar date.
        tests:
          - unique
          - not_null

  - name: fct_messages
    description: Fact table containing Telegram messages.

    columns:

      - name: message_id
        description: Original Telegram message ID. Message IDs are unique only within a Telegram channel, so this column is tested for not_null only.
        tests:
          - not_null

      - name: channel_key
        description: Foreign key referencing dim_channels.
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key

      - name: date_key
        description: Foreign key referencing dim_dates.
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
